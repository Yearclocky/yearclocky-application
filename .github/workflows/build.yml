name: Release And Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "533115990704"
  CODEARTIFACT_DOMAIN: yearclocky
  CODEARTIFACT_REPOSITORY: github

jobs:
  create-release-tag:
    if: github.ref == 'refs/heads/master' && github.actor != 'github-actions[bot]'
    outputs:
      version: ${{ steps.version.outputs.value }}
    concurrency:
      group: release-master
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build
        run: |
          make ci-install
          make build

      - name: Calculate next release version
        id: version
        run: echo "value=$(make next-release-version)" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        run: make set-package-version VERSION=${{ steps.version.outputs.value }}

      - name: Commit and tag release
        run: |
          git add cdk/package.json package-lock.json
          git commit -m "chore(release): ${{ steps.version.outputs.value }}"
          git tag "${{ steps.version.outputs.value }}"

      - name: Push release commit and tag
        run: git push origin HEAD:master --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.value }}" --generate-notes

  publish-package:
    if: github.ref == 'refs/heads/master' && github.actor != 'github-actions[bot]'
    needs: create-release-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.create-release-tag.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify tag matches package version
        run: make verify-package-version VERSION=${{ needs.create-release-tag.outputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::533115990704:role/yearclocky-application-publish-role

      - name: Publish package
        run: make ci-publish-package
